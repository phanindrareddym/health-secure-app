<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Health App</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #0a0f1f, #0d1b2a, #0f3d3e);
            font-family: "Segoe UI", Arial, sans-serif;
            color: #e0e0e0;
        }

        .card {
            width: 480px; /* MEDIUM SIZE */
            padding: 35px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,255,255,0.25);
            box-shadow: 0 0 20px rgba(0,255,255,0.15);
        }

        h2 {
            text-align: center;
            color: #00e5ff;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .tagline {
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: #9fe8ff;
        }

        /* Unified box style */
        .register-box-item {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            font-size: 18px;
            margin-bottom: 20px;
            color: #e0e0e0;
            border: none;
            display: block;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #cfd6dd;
        }

        /* SIGN UP BUTTON */
        .btn-register {
            background: #00e5ff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease-in-out;
            text-align: center;
        }

        .btn-register:hover {
            background: #00ffff;
            box-shadow: 0 0 10px rgba(0,255,255,0.6);
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .success {
            color: #27ff9d;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .link {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .link a {
            color: #00e5ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>
    <div class="tagline"></div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/register">
        <input class="register-box-item" type="text" name="username" placeholder="Choose a Username" required>
        <input class="register-box-item" type="password" name="password" placeholder="Choose a Password" required>

        <button class="register-box-item btn-register" type="submit">Sign Up</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>

        body {
            font-family: Arial, sans-serif;
            background: #f8d7da;
            color: #721c24;
            padding: 40px;
            text-align: center;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            display: inline-block;
            border: 2px solid #f5c6cb;
        }

        <h1>🚫 Access Blocked</h1>

    </div>

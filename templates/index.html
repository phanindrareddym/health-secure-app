<!DOCTYPE html>
<html>
<head>
    <title>Health Check App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>BMI Calculator (U.S. Units)</h1>

<div class="card">
<form action="/" method="POST">

    <label>Age:</label>
    <input type="number" name="age" min="1" required>

    <label>Weight (lbs):</label>
    <input type="number" name="weight" min="50" max="1000" required>

    <label>Height:</label>
    <div class="height-row">
        <input type="number" name="height_ft" placeholder="Feet" min="0" max="8" required>
        <input type="number" name="height_in" placeholder="Inches" min="0" max="11" required>
    </div>

    <button type="submit">Calculate BMI</button>
</form>
</div>

{% if bmi %}
<div class="result-card" style="border-left: 8px solid {{ color }};">
    <h2>Your BMI: {{ bmi }}</h2>

    {% if category %}
    <p><strong>Category:</strong> {{ category }}</p>
    <p><strong>Calorie Suggestion:</strong> {{ calories }}</p>
    <p><strong>Health Tip:</strong> {{ tips }}</p>

    <h3>BMI Chart</h3>
    <ul>
        <li>Underweight: &lt; 18.5</li>
        <li>Normal: 18.5 – 24.9</li>
        <li>Overweight: 25 – 29.9</li>
        <li>Obese: 30+</li>
    </ul>
    {% endif %}
</div>
{% endif %}

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Health Check App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>BMI Calculator (U.S. Units)</h1>

<form action="/calculate" method="POST">

    <label>Age:</label>
    <input type="number" name="age" min="1" required>

    <label>Weight (lbs):</label>
    <input type="number" name="weight" min="50" max="1000" required>

    <label>Height:</label>
    <input type="number" name="height_ft" placeholder="Feet" min="0" max="8" required>
    <input type="number" name="height_in" placeholder="Inches" min="0" max="11" required>

    <button type="submit">Calculate BMI</button>
</form>

</body>
</html>

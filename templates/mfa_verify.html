<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MFA Verification</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #0a0f1f, #0d1b2a, #0f3d3e);
            font-family: "Segoe UI", Arial, sans-serif;
            color: #e0e0e0;
        }

        .card {
            width: 500px;
            padding: 40px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,255,255,0.25);
            box-shadow: 0 0 25px rgba(0,255,255,0.15);
        }

        h2 {
            text-align: center;
            color: #00e5ff;
            margin-bottom: 20px;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 20px;
            background: rgba(255,255,255,0.15);
            color: #e0e0e0;
            text-align: center;
            letter-spacing: 4px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #00e5ff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #00ffff;
            box-shadow: 0 0 12px rgba(0,255,255,0.6);
        }
    </style>
</head>

<body>

<div class="card">
    <h2>MFA Verification</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="code" placeholder="Enter 6-digit code" required>
        <button type="submit">Verify</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MFA Setup</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #0a0f1f, #0d1b2a, #0f3d3e);
            font-family: "Segoe UI", Arial, sans-serif;
            color: #e0e0e0;
        }

        .card {
            width: 480px; /* SMALLER */
            padding: 30px; /* SMALLER */
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,255,255,0.25);
            box-shadow: 0 0 25px rgba(0,255,255,0.15);
        }

        h2 {
            text-align: center;
            color: #00e5ff;
            margin-bottom: 15px; /* SMALLER */
            font-size: 26px; /* SMALLER */
        }

        .mfa-box {
            width: 100%;
            padding: 16px; /* SMALLER */
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            font-size: 18px; /* SMALLER */
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 18px; /* SMALLER */
            color: #e0e0e0;
            border: none;
            display: block;
            box-sizing: border-box;
        }

        .secret-box {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            background: #00e5ff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease-in-out;
        }

        .btn:hover {
            background: #00ffff;
            box-shadow: 0 0 12px rgba(0,255,255,0.6);
        }

        .qr-container {
            text-align: center;
            margin-bottom: 20px; /* SMALLER */
        }

        .qr-container img {
            width: 160px; /* SMALLER */
            height: 160px; /* SMALLER */
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,255,255,0.4);
        }

        p {
            font-size: 15px; /* SMALLER */
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>MFA Setup</h2>

    <p>Scan this QR code using your Authenticator app:</p>

    <div class="qr-container">
        <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code">
    </div>

    <p>Or enter this secret manually:</p>

    <div class="mfa-box secret-box">{{ secret }}</div>

    {% if error %}
        <p style="color:#ff6b6b; font-weight:bold;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input class="mfa-box" type="text" name="code" placeholder="Enter 6-digit code" required>
        <button class="mfa-box btn" type="submit">Verify</button>
    </form>
</div>

</body>
</html>

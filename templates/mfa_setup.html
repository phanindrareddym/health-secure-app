<!DOCTYPE html>
<html>
<body>
    <h2>Set up MFA</h2>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    <p>Your MFA Secret (add to Google Authenticator):</p>
    <p><b>{{ secret }}</b></p>

    <form method="post">
        <input type="text" name="code" placeholder="Enter 6-digit code" required>
        <button type="submit">Verify</button>
    </form>
</body>
</html>

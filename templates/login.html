<!DOCTYPE html>
<html>
<head>
    <title>Login - Health App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            width: 320px;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #2c3e50;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border-radius: 6px;
            border: 1px solid #ccd1d9;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #2980b9;
        }
        .link {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Enter username" required>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>
    <a href="/auth/azure/login"
        style="display:block; margin-top:10px; text-align:center; padding:8px; background:#2F2F2F; color:white; text-decoration:none; border-radius:4px;">
        Sign in with Microsoft
    </a>

    <div class="link">
        Don't have an account? <a href="/register">Create one</a>
    </div>
</div>
</body>
</html>
